<template id="__bundler_thumbnail" data-bg-color="#e8e3d4">
  <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <rect width="1200" height="800" fill="#e8e3d4" />
    <!-- Rice stalk emblem -->
    <g transform="translate(600 400)">
      <!-- center stem -->
      <line x1="0" y1="-180" x2="0" y2="160" stroke="#1a2e2a" stroke-width="6" stroke-linecap="round" />
      <!-- grain clusters -->
      <g fill="#c75a3c">
        <ellipse cx="-22" cy="-150" rx="10" ry="22" transform="rotate(-22 -22 -150)" />
        <ellipse cx="22"  cy="-150" rx="10" ry="22" transform="rotate(22 22 -150)" />
        <ellipse cx="-30" cy="-100" rx="10" ry="22" transform="rotate(-22 -30 -100)" />
        <ellipse cx="30"  cy="-100" rx="10" ry="22" transform="rotate(22 30 -100)" />
        <ellipse cx="-36" cy="-50"  rx="10" ry="22" transform="rotate(-22 -36 -50)" />
        <ellipse cx="36"  cy="-50"  rx="10" ry="22" transform="rotate(22 36 -50)" />
        <ellipse cx="-40" cy="0"    rx="10" ry="22" transform="rotate(-22 -40 0)" />
        <ellipse cx="40"  cy="0"    rx="10" ry="22" transform="rotate(22 40 0)" />
      </g>
      <!-- leaves -->
      <path d="M 0 80 Q -90 100 -120 160 Q -60 130 0 120 Z" fill="#0a5e3e" />
      <path d="M 0 80 Q  90 100  120 160 Q  60 130  0 120 Z" fill="#0a5e3e" />
    </g>
    <text x="600" y="640" text-anchor="middle"
          font-family="serif" font-size="56" font-style="italic" font-weight="500"
          fill="#1a2e2a" letter-spacing="2">Satria Tani</text>
    <text x="600" y="690" text-anchor="middle"
          font-family="monospace" font-size="18" fill="#1a2e2a" opacity="0.55"
          letter-spacing="6">PARAMETRIC RICE INSURANCE</text>
  </svg>
</template>
